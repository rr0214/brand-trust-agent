<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>Brand Trust Agent Architecture</title>
  <desc>Two-agent pipeline showing trust propagation gap, prompt injection, and Arize AX observability</desc>

  <rect width="860" height="580" fill="#F8F9FC" rx="8"/>
  <text x="430" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0F2A5E">Brand Trust Agent — Architecture</text>

  <!-- USER INPUT -->
  <rect x="330" y="54" width="200" height="48" rx="8" fill="#0F2A5E"/>
  <text x="430" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">User Input</text>
  <text x="430" y="91" text-anchor="middle" font-size="10" fill="#CADCFC">Brand query + campaign brief</text>

  <line x1="430" y1="102" x2="430" y2="128" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AGENT 1 -->
  <rect x="60" y="128" width="740" height="140" rx="8" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1.5"/>
  <text x="430" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1A56DB">Agent 1 — Brand Research</text>

  <rect x="88" y="162" width="160" height="88" rx="6" fill="#fff" stroke="#D1D5DB" stroke-width="1"/>
  <text x="168" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">ChromaDB</text>
  <text x="168" y="198" text-anchor="middle" font-size="10" fill="#6B7280">Vector store</text>
  <text x="168" y="213" text-anchor="middle" font-size="10" fill="#6B7280">text-embedding-3-small</text>
  <text x="168" y="228" text-anchor="middle" font-size="10" fill="#6B7280">Top-k retrieval</text>

  <rect x="88" y="258" width="160" height="30" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="168" y="270" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">⚠ verdant_poisoned.txt</text>
  <text x="168" y="282" text-anchor="middle" font-size="9" fill="#DC2626">Hidden injection instruction</text>

  <line x1="248" y1="206" x2="290" y2="206" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="290" y="162" width="160" height="88" rx="6" fill="#fff" stroke="#D1D5DB" stroke-width="1"/>
  <text x="370" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">LLM Synthesis</text>
  <text x="370" y="198" text-anchor="middle" font-size="10" fill="#6B7280">gpt-4o-mini</text>
  <text x="370" y="213" text-anchor="middle" font-size="10" fill="#6B7280">Generates research answer</text>
  <text x="370" y="228" text-anchor="middle" font-size="10" fill="#6B7280">from retrieved chunks</text>

  <line x1="450" y1="206" x2="492" y2="206" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="492" y="162" width="280" height="88" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="632" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">TrustContext Output</text>
  <text x="632" y="198" text-anchor="middle" font-size="10" fill="#1F2937">trust.grounding_score  0.0–1.0</text>
  <text x="632" y="213" text-anchor="middle" font-size="10" fill="#1F2937">trust.injection_risk  NONE | HIGH</text>
  <text x="632" y="228" text-anchor="middle" font-size="10" fill="#1F2937">trust.upstream_span_id  →</text>

  <!-- TRUST GAP -->
  <line x1="60" y1="298" x2="800" y2="298" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="290" y="303" width="280" height="24" rx="4" fill="#FEE2E2"/>
  <text x="430" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">⬇ TRUST GAP — does Agent 2 see the grounding score?</text>

  <line x1="430" y1="327" x2="430" y2="355" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AGENT 2 -->
  <rect x="60" y="355" width="740" height="110" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="377" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">Agent 2 — Campaign Strategy</text>

  <rect x="88" y="388" width="280" height="64" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="228" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">Trust-Unaware (failure mode)</text>
  <text x="228" y="423" text-anchor="middle" font-size="10" fill="#6B7280">Acts on Agent 1 output blindly</text>
  <text x="228" y="438" text-anchor="middle" font-size="10" fill="#6B7280">No grounding score inherited</text>

  <rect x="492" y="388" width="280" height="64" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="632" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">Trust-Aware (the fix)</text>
  <text x="632" y="423" text-anchor="middle" font-size="10" fill="#6B7280">Sees grounding score + risk</text>
  <text x="632" y="438" text-anchor="middle" font-size="10" fill="#6B7280">Hedges or halts on low trust</text>

  <line x1="430" y1="465" x2="430" y2="488" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PRESCRIPTIVE GOVERNANCE -->
  <rect x="180" y="488" width="500" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="430" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">Prescriptive Governance (Pillar 4)</text>
  <text x="430" y="526" text-anchor="middle" font-size="10" fill="#1F2937">Halt · Escalate · Quarantine · Audit log → SOC 2 / EU AI Act</text>

  <!-- ARIZE AX SIDEBAR -->
  <rect x="780" y="128" width="68" height="412" rx="8" fill="#0F2A5E" opacity="0.92"/>
  <text x="814" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" transform="rotate(-90,814,310)">Arize AX — OpenInference Spans</text>
  <rect x="790" y="148" width="48" height="18" rx="3" fill="#1A56DB"/>
  <text x="814" y="161" text-anchor="middle" font-size="8" fill="#fff">RETRIEVER</text>
  <rect x="790" y="172" width="48" height="18" rx="3" fill="#1A56DB"/>
  <text x="814" y="185" text-anchor="middle" font-size="8" fill="#fff">LLM</text>
  <rect x="790" y="196" width="48" height="18" rx="3" fill="#16A34A"/>
  <text x="814" y="209" text-anchor="middle" font-size="8" fill="#fff">AGENT</text>
  <rect x="790" y="370" width="48" height="18" rx="3" fill="#D97706"/>
  <text x="814" y="383" text-anchor="middle" font-size="8" fill="#fff">AGENT</text>
  <rect x="790" y="500" width="48" height="18" rx="3" fill="#7C3AED"/>
  <text x="814" y="513" text-anchor="middle" font-size="8" fill="#fff">GOVERN</text>

  <line x1="800" y1="206" x2="780" y2="206" stroke="#1A56DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="800" y1="415" x2="780" y2="415" stroke="#D97706" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="60" y="550" width="12" height="10" rx="2" fill="#16A34A"/>
  <text x="78" y="560" font-size="9" fill="#6B7280">Trust-aware / safe</text>
  <rect x="160" y="550" width="12" height="10" rx="2" fill="#DC2626"/>
  <text x="178" y="560" font-size="9" fill="#6B7280">Failure / injection</text>
  <rect x="260" y="550" width="12" height="10" rx="2" fill="#7C3AED"/>
  <text x="278" y="560" font-size="9" fill="#6B7280">Governance</text>
  <rect x="340" y="550" width="12" height="10" rx="2" fill="#1A56DB"/>
  <text x="358" y="560" font-size="9" fill="#6B7280">Arize AX span</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
